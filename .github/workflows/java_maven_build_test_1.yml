# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      # We pass the env vars directly here so Spring picks them up
      run: mvn -B package --file ./backend/fortunelink/pom.xml
      env:
        # These match the placeholders in your application-test.yml
        POSTGRES_VERSION: 16-alpine
        # These ensure Spring doesn't complain about missing values
        FMP_BASE_URL: http://localhost
        FMP_API_KEY: test_key
        # Testcontainers will ignore these anyway, but they prevent boot errors
        DB_URL: jdbc:postgresql://localhost:5432/unused
        DB_USERNAME: unused
        DB_PASSWORD: unused
      env:
        DB_URL: jdbc:postgresql://localhost:5432/unused
        DB_USERNAME: unused
        DB_PASSWORD: unused
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        REDIS_PASSWORD: unused
        FMP_BASE_URL: http://localhost
        FMP_API_KEY: test_key
        POSTGRES_VERSION: 16-alpine

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
