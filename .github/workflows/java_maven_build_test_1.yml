# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main", "feature/portfolio_management_v7" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      # Combined into a single env block to prevent YAML parsing errors
      run: mvn -B package -Duser.language=en -Duser.country=CA --file ./backend/fortunelink/pom.xml
      env:
        POSTGRES_VERSION: 16-alpine
        DB_USERNAME: unused
        DB_PASSWORD: unused
        DB_URL: jdbc:postgresql://localhost:5432/unused
        FMP_BASE_URL: http://localhost
        FMP_API_KEY: test_key
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        REDIS_PASSWORD: unused
        SUPABAE_PROJ_URL: http://localhost

    # - name: Update dependency graph
    #   uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
    #   with:
    #     directory: backend/fortunelink