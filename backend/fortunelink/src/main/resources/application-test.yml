spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000
  datasource:
    url: jdbc:tc:postgresql:17.9-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": false
        jdbc:
          "[time_zone]": UTC
  flyway:
    enabled: true
    schemas: public
    default-schema: public
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis
    redis:
      time-to-live: 300s
      cache-null-values: false

fortunelink:
  rate-limit:
    enabled: false # never rate limit in tests
  cors:
    allowed-origins: http://localhost:3000

fmp:
  base-url: ${FMP_BASE_URL:http://localhost}
  api-key: ${FMP_API_KEY:test_key}
  timeout-seconds: 5
  debug-logging: false

boc:
  base-url: ${BOC_BASE_URL:http://localhost}
  timeout-seconds: 5
  debug-logging: false

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always

logging:
  level:
    "[org.hibernate.SQL]": ERROR
    "[com.laderrco.fortunelink]": INFO