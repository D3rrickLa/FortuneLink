spring:
  application:
    name: fortunelink
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    schemas: public
    default-schema: public
    baseline-version: 0
    baseline-on-migrate: true
    locations: classpath:db/migration

fortunelink:
  cache:
    enabled: true
    ttl:
      buy-fees: 300
      current-prices: 300
      historical-prices: 86400
      asset-info: 604800
      trading-currency: 604800
      exchange-rates: 3600
    key-prefix:
      buy-fees: "fees:buy"
      prices: "market:price"
      historical: "market:historical"
      asset-info: "market:info"
      currency: "market:currency"
  purge:
    excluded-transaction-retention-days: 365
  rate-limit:
    enabled: true
    global:
      requests-per-minute: 60
      requests-per-hour: 1000
      requests-per-day: 10000
    endpoints:
      market-data-price:
        requests-per-minute: 30
        requests-per-hour: 500
      market-data-batch:
        requests-per-minute: 10
        requests-per-hour: 100
      portfolio-read:
        requests-per-minute: 60
        requests-per-hour: 1000
      portfolio-write:
        requests-per-minute: 20
        requests-per-hour: 200
    fmp-quota:
      daily-limit: 250
      warning-threshold: 200
      reserve-buffer: 25

resilience4j:
  circuitbreaker:
    instances:
      fmp-api:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
        recordExceptions:
          - com.laderrco.fortunelink.portfolio.infrastructure.market.fmp.exceptions.FmpApiException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
        ignoreExceptions:
          - com.laderrco.fortunelink.portfolio.infrastructure.exceptions.UnknownSymbolException
      boc-api:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 60s
        failureRateThreshold: 60
  retry:
    instances:
      fmp-api:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - com.laderrco.fortunelink.portfolio.infrastructure.market.fmp.exceptions.FmpApiException
      boc-api:
        maxAttempts: 2
        waitDuration: 1s
  timelimiter:
    instances:
      fmp-api:
        timeoutDuration: 12s
      boc-api:
        timeoutDuration: 15s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    "[com.fortunelink]": INFO
    "[org.springframework.cache]": INFO
    "[io.lettuce.core]": INFO
    "[org.hibernate.SQL]": ERROR
    "[org.hibernate.type.descriptor.sql]": ERROR

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs