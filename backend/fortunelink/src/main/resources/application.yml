spring:
  application:
    name: fortunelink
  
  profiles:
    active: local # Default to local so it works out-of-the-box for you


  config:
    import: "optional:file:.env[.properties]"

  # ============================================
  # DATABASE
  # ============================================
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ============================================
  # REDIS (env-driven, Docker-friendly)
  # ============================================
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
        shutdown-timeout: 100ms

  # ============================================
  # SPRING CACHE (Redis-backed)
  # ============================================
  cache:
    type: redis
    redis:
      time-to-live: 300s
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "fortunelink:"

# ============================================
# APPLICATION CACHING
# ============================================
fortunelink:
  cache:
    enabled: true

    ttl:
      current-prices: 300
      historical-prices: 86400
      asset-info: 604800
      trading-currency: 604800
      exchange-rates: 3600

    key-prefix:
      prices: "market:price:"
      historical: "market:historical:"
      asset-info: "market:info:"
      currency: "market:currency:"

  # ============================================
  # RATE LIMITING (Redis / Bucket4j)
  # ============================================
  rate-limit:
    enabled: true

    global:
      requests-per-minute: 60
      requests-per-hour: 1000
      requests-per-day: 10000

    endpoints:
      market-data-price:
        requests-per-minute: 30
        requests-per-hour: 500

      market-data-batch:
        requests-per-minute: 10
        requests-per-hour: 100

      portfolio-read:
        requests-per-minute: 60
        requests-per-hour: 1000

      portfolio-write:
        requests-per-minute: 20
        requests-per-hour: 200

    fmp-quota:
      daily-limit: 250
      warning-threshold: 200
      reserve-buffer: 25

# ============================================
# FMP API
# ============================================
fmp:
  base-url: ${FMP_BASE_URL}
  api-key: ${FMP_API_KEY}
  timeout-seconds: 10
  debug-logging: false
# ============================================
# BOC API
# ============================================
boc:
  timeout-seconds: 10
  debug-logging: false

# ============================================
# ACTUATOR & METRICS
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: when-authorized
    caches:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ============================================
# LOGGING (safe defaults)
# ============================================
logging:
  level:
    com.fortunelink: INFO
    org.springframework.cache: INFO
    io.lettuce.core: INFO

